<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cliff Jiang Portfolio</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- =========================================================
    LOADING SCREEN
      Shows the fake terminal boot sequence before the site opens.
       Controlled by script.js through:
        #code-log
        hide-loading
  ========================================================== -->
  <section id="loading-screen" class="screen loading-screen" aria-label="Loading screen">
    <div class="code-log" id="code-log"></div>
    <div class="loading-text">LOADING...</div>
  </section>


  <!-- =========================================================
    START SCREEN
      First interactive screen after loading.
       User clicks or presses a key to enter the main portfolio map.
       Controlled by script.js through:
        start-exit
  ========================================================== -->
  <section id="start-screen" class="screen start-screen" aria-label="Start screen">
    <div class="start-content">
      <h1>WELCOME ABOARD</h1>
      <p>You have arrived at Cliff Jiang's portfolio</p>
      <div class="press-text">PRESS TO OPEN</div>
    </div>
  </section>


  <!-- =========================================================
    MAIN MAP SCREEN
      Main visual area of the website.
       Includes:
        map background
        dark overlay
        grid overlay
        right-side navigation UI
        temporary title text(will be replaced after map update)
       Controlled by script.js through:
        .map-active
  ========================================================== -->
  <main id="map-screen" class="screen map-screen" aria-label="Project map screen">
    <!-- =======================================================
  MAP WORLD
    This layer contains the actual map image and clickable map points.
    JS will zoom this whole layer toward the selected point.
======================================================== -->
<div class="map-world" id="mapWorld">
  <!-- Background image layer -->
  <div class="map-bg" aria-hidden="true"></div>

  <!-- Clickable points on the map.
       --x and --y decide the point position on screen.
       data-section must match the right-side UI button.
       data-url is the page to open after the animation.
  -->
  <div class="map-points" aria-label="Map interaction points">
    <button
      class="map-point"
      type="button"
      data-section="about"
      data-url="about.html"
      style="--x: 42%; --y: 38%;"
      aria-label="Open About page"
    >
      <span class="point-core"></span>
      <span class="point-label">ABOUT</span>
    </button>

    <button
      class="map-point"
      type="button"
      data-section="game"
      data-url="game.html"
      style="--x: 54%; --y: 52%;"
      aria-label="Open Game portfolio page"
    >
      <span class="point-core"></span>
      <span class="point-label">GAME</span>
    </button>

    <button
      class="map-point"
      type="button"
      data-section="art"
      data-url="art.html"
      style="--x: 34%; --y: 58%;"
      aria-label="Open Art Work portfolio page"
    >
      <span class="point-core"></span>
      <span class="point-label">ART</span>
    </button>

    <button
      class="map-point"
      type="button"
      data-section="sound"
      data-url="sound.html"
      style="--x: 62%; --y: 34%;"
      aria-label="Open Sound portfolio page"
    >
      <span class="point-core"></span>
      <span class="point-label">SOUND</span>
    </button>

    <button
      class="map-point"
      type="button"
      data-section="cv"
      data-url="cv.html"
      style="--x: 47%; --y: 67%;"
      aria-label="Open CV page"
    >
      <span class="point-core"></span>
      <span class="point-label">CV</span>
    </button>

    <button
      class="map-point"
      type="button"
      data-section="contact"
      data-url="contact.html"
      style="--x: 70%; --y: 60%;"
      aria-label="Open Contact page"
    >
      <span class="point-core"></span>
      <span class="point-label">CONTACT</span>
    </button>
  </div>
</div>

<!-- Dark gradient / vignette overlay -->
<div class="map-overlay" aria-hidden="true"></div>

<!-- Sci-fi grid overlay -->
<div class="map-grid" aria-hidden="true"></div>

<!-- Four edge lines that move toward the selected map point -->
<div class="target-lines" id="targetLines" aria-hidden="true">
  <span class="target-line line-top"></span>
  <span class="target-line line-bottom"></span>
  <span class="target-line line-left"></span>
  <span class="target-line line-right"></span>
</div>


    <!-- =======================================================
      RIGHT SIDE UI
         Current navigation structure:
          ABOUT
          PORTFOLIO
            GAME
            ART WORK
            SOUND
          CV
          CONTACT
    ======================================================== -->
    <aside class="right-ui" aria-label="Right side interface">
      <nav class="right-nav" id="rightNav" aria-label="Main navigation">
        <!-- About button -->
        <button class="nav-block" type="button" data-section="about">
          <span class="nav-label">ABOUT</span>
        </button>


        <!-- Portfolio parent block -->
        <div class="nav-group portfolio-group" id="portfolioGroup">
          <button
            class="nav-block portfolio-main"
            id="portfolioBtn"
            type="button"
            aria-expanded="false"
            aria-controls="portfolioSubmenu"
          >
            <span class="nav-label">PORTFOLIO</span>
            <span class="nav-arrow" aria-hidden="true">⌄</span>
          </button>

          <!-- Portfolio child blocks -->
          <div class="portfolio-submenu" id="portfolioSubmenu">
            <button class="sub-block" type="button" data-section="game">
              GAME
            </button>

            <button class="sub-block" type="button" data-section="art">
              ART WORK
            </button>

            <button class="sub-block" type="button" data-section="sound">
              SOUND
            </button>
          </div>
        </div>


        <!-- CV button -->
        <button class="nav-block" type="button" data-section="cv">
          <span class="nav-label">CV</span>
        </button>


        <!-- Contact button -->
        <button class="nav-block" type="button" data-section="contact">
          <span class="nav-label">CONTACT</span>
        </button>
      </nav>
    </aside>


    <!-- Temporary center title. This will be replaced by actual content panels. -->
    <!-- <h2 class="map-title">PROJECT MAP</h2> -->
  </main>


  <!-- Main JavaScript -->
  <script src="script.js"></script>
</body>
</html>
